<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquido - Order Online</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root { --yellow:#FFD600; --purple:#6B21A8; --dark:#1a1a1a; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Poppins',sans-serif; background:#f5f0e8; color:var(--dark); transition: background 0.3s; }

  /* HEADER */
  .header { background:var(--purple); padding:14px 20px; text-align:center; position:sticky; top:0; z-index:100; box-shadow:0 4px 20px rgba(107,33,168,0.4); }
  .header-row { display:flex; align-items:center; justify-content:space-between; }
  .header-center { text-align:center; flex:1; }
  .header h1 { font-size:1.9rem; font-weight:900; color:var(--yellow); letter-spacing:2px; line-height:1; margin:0; }
  .header p { color:#e0c8ff; font-size:0.72rem; letter-spacing:2px; text-transform:uppercase; margin-top:2px; }

  /* BANNER */
  .banner { background:var(--yellow); text-align:center; padding:7px 10px; font-size:0.75rem; font-weight:700; color:var(--purple); min-height: 30px; }

  /* TABS */
  .tabs-wrap { background:white; border-bottom:2px solid #eee; position:sticky; top:82px; z-index:99; }
  .tabs { display:flex; overflow-x:auto; gap:4px; padding:9px 12px; scrollbar-width:none; }
  .tabs::-webkit-scrollbar { display:none; }
  .tab { flex-shrink:0; background:#f0e6ff; color:var(--purple); border:none; border-radius:20px; padding:5px 13px; font-size:0.73rem; font-weight:600; cursor:pointer; font-family:'Poppins',sans-serif; white-space:nowrap; }
  .tab.active { background:var(--purple); color:white; }

  /* MENU */
  .menu-section { padding:0 12px 110px; }
  .category { margin-top:22px; scroll-margin-top: 140px; }
  .cat-title { font-size:1.1rem; font-weight:800; color:var(--purple); border-left:5px solid var(--yellow); padding-left:11px; margin-bottom:11px; letter-spacing:0.5px; }
  .items-grid { display:flex; flex-direction:column; gap:9px; }

  /* ITEM CARD */
  .item-card { background:white; border-radius:13px; padding:11px 13px; display:flex; align-items:center; gap:11px; box-shadow:0 2px 8px rgba(0,0,0,0.07); }
  .item-img { width:68px; height:68px; border-radius:10px; object-fit:cover; flex-shrink:0; background:#ede9f5; }
  .item-info { flex:1; min-width:0; }
  .item-name { font-weight:600; font-size:0.88rem; color:#1a1a1a; line-height:1.3; }
  .item-price { color:var(--purple); font-weight:700; font-size:0.85rem; margin-top:3px; }
  .best-badge { display:inline-block; background:#fff0f0; color:#dc2626; font-size:0.6rem; font-weight:800; border-radius:5px; padding:2px 6px; margin-left:5px; vertical-align:middle; }

  /* BUTTONS */
  .size-btns { display:flex; gap:5px; margin-top:7px; flex-wrap:wrap; }
  .size-btn { background:#f0e6ff; color:var(--purple); border:1.5px solid #d8b4fe; border-radius:8px; padding:4px 10px; font-size:0.71rem; font-weight:600; cursor:pointer; }
  .add-btn { background:var(--yellow); color:var(--purple); border:none; border-radius:8px; padding:7px 13px; font-weight:700; font-size:0.8rem; cursor:pointer; }
  
  /* CART BUTTON */
  .cart-btn { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); background:var(--purple); color:white; border:none; border-radius:50px; padding:13px 26px; font-size:0.95rem; font-weight:700; cursor:pointer; box-shadow:0 6px 24px rgba(107,33,168,0.5); display:flex; align-items:center; gap:10px; z-index:200; min-width:230px; justify-content:space-between; }
  .cart-badge { background:var(--yellow); color:var(--purple); border-radius:50%; width:27px; height:27px; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:0.82rem; }

  /* DRAWER & OVERLAY */
  .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:300; }
  .overlay.show { display:flex; align-items:flex-end; }
  .drawer { background:white; width:100%; border-radius:22px 22px 0 0; padding:18px 16px 32px; max-height:88vh; overflow-y:auto; }
  .drawer-handle { width:38px; height:4px; background:#ddd; border-radius:4px; margin:0 auto 14px; }
  .drawer-title { font-size:1.2rem; font-weight:800; color:var(--purple); margin-bottom:14px; }

  /* FORMS */
  .flabel { font-size:0.78rem; font-weight:600; color:#555; margin-bottom:4px; display:block; margin-top:10px; }
  .finput { width:100%; padding:10px 13px; border:2px solid #e0d0ff; border-radius:10px; font-family:'Poppins',sans-serif; font-size:0.85rem; outline:none; margin-bottom:5px; }
  .pay-opts { display:flex; gap:8px; margin:10px 0; }
  .pay-opt { flex:1; padding:9px 6px; border:2px solid #e0d0ff; border-radius:10px; text-align:center; cursor:pointer; font-size:0.78rem; font-weight:600; }
  .pay-opt.sel { border-color:var(--purple); background:#f5eeff; color:var(--purple); }
  
  /* CART ITEMS */
  .c-item { display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid #f0f0f0; }
  .qty-wrap { display:flex; align-items:center; gap:5px; }
  .qty-btn { width:26px; height:26px; background:var(--purple); color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold; }
  .qty-btn.minus { background:#e0d0ff; color:var(--purple); }

  .upi-box { background:#fdf9ff; border:2px solid #e0d0ff; border-radius:13px; padding:14px; text-align:center; margin-top:10px; }
  .upi-link { display:block; background:#00b247; color:white; border-radius:9px; padding:11px; font-weight:700; text-decoration:none; margin-top:8px; }
  .order-btn { width:100%; background:var(--purple); color:white; border:none; border-radius:13px; padding:14px; font-size:0.95rem; font-weight:700; cursor:pointer; margin-top:15px; }

  /* DARK MODE */
  .dark { --dark:#f0f0f0; }
  .dark body { background:#0f0f0f; color:#f0f0f0; }
  .dark .item-card, .dark .drawer, .dark .tabs-wrap { background:#1a1a1a; }
  .dark .tab { background:#1e1228; color:#d8b4fe; }
  .dark .finput { background:#1a1a1a; color:white; border-color:#333; }
  .dark .item-name { color:white; }

  /* SPLASH */
  .splash{position:fixed;inset:0;background:#6B21A8;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.5s}
  .splash.hide{opacity:0;pointer-events:none}
  .splash h1{font-size:3rem;font-weight:900;color:#FFD600;letter-spacing:3px;}

  .toast { position:fixed; bottom:88px; left:50%; transform:translateX(-50%); background:#1a1a1a; color:white; padding:9px 20px; border-radius:50px; font-size:0.8rem; z-index:500; opacity:0; transition:opacity 0.3s; pointer-events:none; }
  .toast.show { opacity:1; }
  
  .dark-btn{background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.3);color:#fff;border-radius:9px;padding:6px 10px;font-size:0.7rem;cursor:pointer}
</style>
</head>
<body>

<div class="splash" id="splash" style="pointer-events:none">
  <h1>LIQUIDO</h1>
  <p style="color:#e0c8ff">Fresh • Fast • Flavourful</p>
</div>

<div class="header">
  <div class="header-row">
    <button class="dark-btn" onclick="toggleDark()" id="darkBtn">🌙</button>
    <div class="header-center">
      <h1>LIQUIDO</h1>
      <p>Fresh • Fast • Flavourful</p>
    </div>
    <a class="dark-btn" href="https://wa.me/917014809238" target="_blank" style="text-decoration:none">💬</a>
  </div>
</div>

<div class="banner" id="bannerText">🏷️ Tag us on Social Media & Google Review → Get 10% OFF!</div>

<div class="tabs-wrap"><div class="tabs" id="tabs"></div></div>
<div class="menu-section" id="menuSection"></div>

<button class="cart-btn" id="cartBtn" style="display:none" onclick="openCart()">
  <span>🛒 View Cart</span>
  <span id="cartSummary" style="font-size:0.78rem;opacity:0.85"></span>
  <span class="cart-badge" id="cartCount">0</span>
</button>

<div class="overlay" id="overlay" onclick="closeCart()">
  <div class="drawer" onclick="event.stopPropagation()">
    <div class="drawer-handle"></div>
    <div class="drawer-title">Your Order 🛒</div>
    <div id="cartItems"></div>
    <div id="cartFooter"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const WA = '917014809238';
const UPI = 'BHARATPE.8P0M0U9N8Z03820@fbpe';
const UNAME = 'Liquido';
const BESTSELLERS = ['Veg Steam Momos','Schezwan Momos','Masala Maggi','Oreo Cold Coffee','Oreo Shake','Veg Cheesy Burger','Kurkure Veg Momos'];

const menuData = [
  { cat:'Momos', items:[
    { name:'Veg Steam Momos', img:'https://upload.wikimedia.org/wikipedia/commons/thumb/8/8b/Momos_on_a_plate.jpg/400px-Momos_on_a_plate.jpg', sizes:[{l:'Half (5pc)',p:50},{l:'Full (10pc)',p:80}] },
    { name:'Deep Fried Momos', img:'https://upload.wikimedia.org/wikipedia/commons/thumb/8/8b/Momos_on_a_plate.jpg/400px-Momos_on_a_plate.jpg', sizes:[{l:'Half (5pc)',p:50},{l:'Full (10pc)',p:90}] },
    { name:'Kurkure Veg Momos', img:'https://upload.wikimedia.org/wikipedia/commons/thumb/8/8b/Momos_on_a_plate.jpg/400px-Momos_on_a_plate.jpg', sizes:[{l:'Half (5pc)',p:89},{l:'Full (10pc)',p:129}] },
  ]},
  { cat:'Sandwich', items:[
    { name:'Grilled Sandwich', img:'https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Grilled_cheese_on_white_with_tomato_soup.jpg/400px-Grilled_cheese_on_white_with_tomato_soup.jpg', price:79 },
    { name:'Cheese Corn Sandwich', img:'https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Grilled_cheese_on_white_with_tomato_soup.jpg/400px-Grilled_cheese_on_white_with_tomato_soup.jpg', price:99 },
  ]},
  { cat:'Maggi', items:[
    { name:'Masala Maggi', img:'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a3/Masala_Maggi.jpg/400px-Masala_Maggi.jpg', price:40 },
    { name:'Vegetable Cheese Maggi', img:'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a3/Masala_Maggi.jpg/400px-Masala_Maggi.jpg', price:80 },
  ]},
  { cat:'Cold Coffee', items:[
    { name:'Classic Cold Coffee', img:'https://upload.wikimedia.org/wikipedia/commons/thumb/4/45/A_small_cup_of_coffee.JPG/400px-A_small_cup_of_coffee.JPG', price:59 },
    { name:'Oreo Cold Coffee', img:'https://upload.wikimedia.org/wikipedia/commons/thumb/4/45/A_small_cup_of_coffee.JPG/400px-A_small_cup_of_coffee.JPG', price:99 },
  ]},
  { cat:'Burger', items:[
    { name:'Aloo Tikki Burger', img:'https://upload.wikimedia.org/wikipedia/commons/thumb/4/47/PNG_transparency_demonstration_1.png/400px-PNG_transparency_demonstration_1.png', price:49 },
    { name:'Veg Cheesy Burger', img:'https://upload.wikimedia.org/wikipedia/commons/thumb/4/47/PNG_transparency_demonstration_1.png/400px-PNG_transparency_demonstration_1.png', price:59 },
  ]}
];

let cart = [], payMethod = 'upi', locText = '';

// Initialize Tabs
const tabsEl = document.getElementById('tabs');
menuData.forEach((cat, i) => {
  const b = document.createElement('button');
  b.className = 'tab' + (i===0?' active':'');
  b.textContent = cat.cat;
  b.onclick = () => {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('c'+i).scrollIntoView({behavior:'smooth'});
  };
  tabsEl.appendChild(b);
});

// Initialize Menu
const menuEl = document.getElementById('menuSection');
menuData.forEach((cat, ci) => {
  const sec = document.createElement('div');
  sec.className = 'category';
  sec.id = 'c'+ci;
  sec.innerHTML = `<div class="cat-title">${cat.cat}</div><div class="items-grid" id="g${ci}"></div>`;
  menuEl.appendChild(sec);
  const grid = document.getElementById('g'+ci);
  cat.items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'item-card';
    const best = BESTSELLERS.includes(item.name) ? '<span class="best-badge">🔥 Best</span>' : '';
    let actionHtml = item.sizes ? 
      `<div class="size-btns">${item.sizes.map(s=>`<button class="size-btn" onclick="addItem('${item.name} - ${s.l}',${s.p})">${s.l} ₹${s.p}</button>`).join('')}</div>` :
      `<button class="add-btn" onclick="addItem('${item.name}',${item.price})">Add ₹${item.price}</button>`;
    
    card.innerHTML = `
      <img class="item-img" src="${item.img}" onerror="this.src='https://via.placeholder.com/68'">
      <div class="item-info">
        <div class="item-name">${item.name}${best}</div>
        ${actionHtml}
      </div>`;
    grid.appendChild(card);
  });
});

function addItem(name, price) {
  const ex = cart.find(i=>i.name===name);
  if (ex) ex.qty++; else cart.push({name, price, qty:1});
  updateCartUI();
  showToast('✅ Added ' + name.split(' - ')[0]);
}

function removeItem(name) {
  const idx = cart.findIndex(i=>i.name===name);
  if (idx > -1) {
    cart[idx].qty--;
    if (cart[idx].qty <= 0) cart.splice(idx, 1);
  }
  updateCartUI();
  renderCart();
}

function updateCartUI() {
  const total = cart.reduce((s,i)=>s+i.price*i.qty,0);
  const count = cart.reduce((s,i)=>s+i.qty,0);
  const btn = document.getElementById('cartBtn');
  btn.style.display = count > 0 ? 'flex' : 'none';
  document.getElementById('cartCount').textContent = count;
  document.getElementById('cartSummary').textContent = '₹' + total;
}

function openCart() { document.getElementById('overlay').classList.add('show'); renderCart(); }
function closeCart() { document.getElementById('overlay').classList.remove('show'); }

function renderCart() {
  const el = document.getElementById('cartItems');
  const footer = document.getElementById('cartFooter');
  if (!cart.length) {
    el.innerHTML = '<div style="text-align:center;padding:20px;color:#999">Cart is empty</div>';
    footer.innerHTML = ''; return;
  }
  const total = cart.reduce((s,i)=>s+i.price*i.qty,0);
  el.innerHTML = cart.map(item => `
    <div class="c-item">
      <div><b>${item.name}</b><br><small>₹${item.price} x ${item.qty}</small></div>
      <div class="qty-wrap">
        <button class="qty-btn minus" onclick="removeItem('${item.name}')">−</button>
        <span>${item.qty}</span>
        <button class="qty-btn" onclick="addItem('${item.name}',${item.price})">+</button>
      </div>
    </div>`).join('') + `<div style="display:flex;justify-content:space-between;padding:15px 0;font-weight:800;font-size:1.1rem;color:var(--purple)"><span>Total</span><span>₹${total}</span></div>`;

  footer.innerHTML = `
    <label class="flabel">👤 Your Name</label>
    <input class="finput" id="cName" placeholder="Enter Name">
    <label class="flabel">📍 Delivery Address</label>
    <input class="finput" id="cAddr" placeholder="House no, Street, Area">
    <button class="size-btn" style="width:100%;margin-bottom:10px" onclick="getLocation()">📍 Detect My Location</button>
    <div id="locRes"></div>
    <div class="pay-opts">
      <div class="pay-opt ${payMethod==='upi'?'sel':''}" onclick="selPay('upi')">UPI / QR</div>
      <div class="pay-opt ${payMethod==='cod'?'sel':''}" onclick="selPay('cod')">Cash</div>
    </div>
    <div id="payBox"></div>
    <button class="order-btn" onclick="placeOrder()">💬 Order via WhatsApp</button>`;
  renderPay(total);
}

function selPay(m) { payMethod = m; renderCart(); }

function renderPay(total) {
  const pb = document.getElementById('payBox');
  if (payMethod === 'upi') {
    const link = `upi://pay?pa=${UPI}&pn=${encodeURIComponent(UNAME)}&am=${total}&cu=INR`;
    pb.innerHTML = `<div class="upi-box"><small>UPI ID: ${UPI}</small><br><strong>₹${total}</strong><a href="${link}" class="upi-link">Pay with UPI App</a></div>`;
  } else {
    pb.innerHTML = `<div style="background:#fff8e1;padding:10px;border-radius:8px;font-size:0.8rem;margin-top:10px">💵 Pay cash at the time of delivery.</div>`;
  }
}

function getLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(p => {
      locText = `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
      document.getElementById('locRes').innerHTML = '✅ Location Saved!';
    });
  }
}

function placeOrder() {
  const name = document.getElementById('cName').value;
  const addr = document.getElementById('cAddr').value;
  if (!name || !addr) { alert('Please fill Name and Address'); return; }
  
  const total = cart.reduce((s,i)=>s+i.price*i.qty,0);
  const items = cart.map(i=>`• ${i.name} x ${i.qty} = ₹${i.price*i.qty}`).join('\n');
  let msg = `*LIQUIDO ORDER*\n\n👤 Name: ${name}\n📍 Addr: ${addr}\n${locText?'🗺️ Map: '+locText:''}\n\n📦 *Items:*\n${items}\n\n💰 *Total: ₹${total}*\n💳 Payment: ${payMethod.toUpperCase()}`;
  window.open(`https://wa.me/${WA}?text=${encodeURIComponent(msg)}`);
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

function toggleDark() {
  document.body.classList.toggle('dark');
  const btn = document.getElementById('darkBtn');
  btn.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
}

setTimeout(()=>{
  const s = document.getElementById('splash');
  if(s){ s.style.opacity='0'; setTimeout(()=>s.style.display='none', 400); }
}, 800);
function dummy_load() {

// Banner Rotation
const quotes = ['🏷️ Tag us on Instagram for 10% OFF!', '🥟 Best Momos in Town!', '🛵 Delivery in 30-45 Mins!'];
let qIdx = 0;
setInterval(() => {
  qIdx = (qIdx + 1) % quotes.length;
  document.getElementById('bannerText').textContent = quotes[qIdx];
}, 4000);

</script>
</body>
</html>
