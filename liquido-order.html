<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquido - Order Online</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root { --yellow:#FFD600; --purple:#6B21A8; --dark:#1a1a1a; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Poppins',sans-serif; background:#f5f0e8; color:var(--dark); }

  /* HEADER */
  .header { background:var(--purple); padding:14px 20px; text-align:center; position:sticky; top:0; z-index:100; box-shadow:0 4px 20px rgba(107,33,168,0.4); }
  .header h1 { font-family:'Poppins',sans-serif; font-size:1.9rem; font-weight:900; color:var(--yellow); letter-spacing:2px; line-height:1; }
  .header p { color:#e0c8ff; font-size:0.72rem; letter-spacing:2px; text-transform:uppercase; margin-top:2px; }

  /* BANNER */
  .banner { background:var(--yellow); text-align:center; padding:7px 10px; font-size:0.75rem; font-weight:700; color:var(--purple); }

  /* TABS */
  .tabs-wrap { background:white; border-bottom:2px solid #eee; position:sticky; top:82px; z-index:99; }
  .tabs { display:flex; overflow-x:auto; gap:4px; padding:9px 12px; scrollbar-width:none; }
  .tabs::-webkit-scrollbar { display:none; }
  .tab { flex-shrink:0; background:#f0e6ff; color:var(--purple); border:none; border-radius:20px; padding:5px 13px; font-size:0.73rem; font-weight:600; cursor:pointer; font-family:'Poppins',sans-serif; white-space:nowrap; }
  .tab.active, .tab:hover { background:var(--purple); color:white; }

  /* MENU */
  .menu-section { padding:0 12px 110px; }
  .category { margin-top:22px; }
  .cat-title { font-family:'Poppins',sans-serif; font-size:1.1rem; font-weight:800; color:var(--purple); border-left:5px solid var(--yellow); padding-left:11px; margin-bottom:11px; letter-spacing:0.5px; }
  .items-grid { display:flex; flex-direction:column; gap:9px; }

  /* ITEM CARD */
  .item-card { background:white; border-radius:13px; padding:11px 13px; display:flex; align-items:center; gap:11px; box-shadow:0 2px 8px rgba(0,0,0,0.07); }
  .item-img { width:68px; height:68px; border-radius:10px; object-fit:cover; flex-shrink:0; background:#ede9f5; }
  .item-info { flex:1; min-width:0; }
  .item-name { font-weight:600; font-size:0.88rem; color:#1a1a1a; line-height:1.3; }
  .item-price { color:var(--purple); font-weight:700; font-size:0.85rem; margin-top:3px; }
  .item-note { font-size:0.7rem; color:#999; margin-top:2px; }

  /* SIZE BTNS */
  .size-btns { display:flex; gap:5px; margin-top:7px; flex-wrap:wrap; }
  .size-btn { background:#f0e6ff; color:var(--purple); border:1.5px solid #d8b4fe; border-radius:8px; padding:4px 10px; font-size:0.71rem; font-weight:600; cursor:pointer; font-family:'Poppins',sans-serif; }
  .size-btn:hover { background:var(--purple); color:white; }

  /* QTY */
  .qty-wrap { display:flex; align-items:center; gap:2px; flex-shrink:0; }
  .qty-btn { width:28px; height:28px; background:var(--purple); color:white; border:none; border-radius:7px; font-size:1rem; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; font-family:'Poppins',sans-serif; }
  .qty-btn.minus { background:#e0d0ff; color:var(--purple); }
  .qty-num { min-width:26px; text-align:center; font-weight:700; font-size:0.9rem; }
  .add-btn { background:var(--yellow); color:var(--purple); border:none; border-radius:8px; padding:7px 13px; font-weight:700; font-size:0.8rem; cursor:pointer; font-family:'Poppins',sans-serif; white-space:nowrap; flex-shrink:0; }
  .add-btn:hover { background:var(--purple); color:white; }

  /* CART BUTTON */
  .cart-btn { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); background:var(--purple); color:white; border:none; border-radius:50px; padding:13px 26px; font-size:0.95rem; font-weight:700; cursor:pointer; font-family:'Poppins',sans-serif; box-shadow:0 6px 24px rgba(107,33,168,0.5); display:flex; align-items:center; gap:10px; z-index:200; min-width:230px; justify-content:space-between; }
  .cart-badge { background:var(--yellow); color:var(--purple); border-radius:50%; width:27px; height:27px; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:0.82rem; }

  /* OVERLAY */
  .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:300; }
  .overlay.show { display:flex; align-items:flex-end; }

  /* DRAWER */
  .drawer { background:white; width:100%; border-radius:22px 22px 0 0; padding:18px 16px 32px; max-height:88vh; overflow-y:auto; }
  .drawer-handle { width:38px; height:4px; background:#ddd; border-radius:4px; margin:0 auto 14px; }
  .drawer-title { font-family:'Poppins',sans-serif; font-size:1.2rem; font-weight:800; color:var(--purple); margin-bottom:14px; }

  /* CART ITEMS */
  .c-item { display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid #f0f0f0; gap:8px; }
  .c-name { font-size:0.85rem; font-weight:600; flex:1; }
  .c-price { color:var(--purple); font-weight:700; font-size:0.85rem; }
  .c-total { display:flex; justify-content:space-between; padding:13px 0 6px; font-weight:700; font-size:1rem; }
  .c-total span:last-child { color:var(--purple); font-size:1.1rem; }
  .empty { text-align:center; padding:28px 0; color:#bbb; font-size:0.9rem; }

  /* FORM */
  .flabel { font-size:0.78rem; font-weight:600; color:#555; margin-bottom:4px; display:block; margin-top:10px; }
  .finput { width:100%; padding:10px 13px; border:2px solid #e0d0ff; border-radius:10px; font-family:'Poppins',sans-serif; font-size:0.85rem; outline:none; }
  .finput:focus { border-color:var(--purple); }
  .loc-btn { width:100%; background:#f0e6ff; color:var(--purple); border:2px dashed #d8b4fe; border-radius:10px; padding:10px; font-family:'Poppins',sans-serif; font-size:0.82rem; font-weight:600; cursor:pointer; margin-top:10px; }
  .loc-ok { font-size:0.73rem; color:green; background:#e8ffe8; border-radius:8px; padding:6px 10px; margin-top:6px; }

  /* PAYMENT */
  .pay-opts { display:flex; gap:8px; margin:10px 0; }
  .pay-opt { flex:1; padding:9px 6px; border:2px solid #e0d0ff; border-radius:10px; text-align:center; cursor:pointer; font-size:0.78rem; font-weight:600; color:#666; }
  .pay-opt.sel { border-color:var(--purple); background:#f5eeff; color:var(--purple); }
  .pay-opt .icon { font-size:1.3rem; display:block; margin-bottom:3px; }
  .upi-box { background:#fdf9ff; border:2px solid #e0d0ff; border-radius:13px; padding:14px; text-align:center; margin-bottom:10px; }
  .upi-id { font-size:0.78rem; color:#555; }
  .upi-id b { color:var(--purple); }
  .upi-amt { font-size:1.25rem; font-weight:800; margin:7px 0; }
  .upi-link { display:block; width:100%; background:#00b247; color:white; border:none; border-radius:9px; padding:11px; font-family:'Poppins',sans-serif; font-size:0.88rem; font-weight:700; cursor:pointer; margin-top:8px; text-decoration:none; }
  .cod-box { background:#fff8e1; border-radius:10px; padding:11px; font-size:0.8rem; color:#7a5c00; margin-bottom:10px; }

  /* ORDER BTN */
  .order-btn { width:100%; background:var(--purple); color:white; border:none; border-radius:13px; padding:14px; font-family:'Poppins',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; margin-top:8px; display:flex; align-items:center; justify-content:center; gap:7px; }
  .order-btn:hover { background:#7e22ce; }

  /* TOAST */
  .toast { position:fixed; bottom:88px; left:50%; transform:translateX(-50%); background:#1a1a1a; color:white; padding:9px 20px; border-radius:50px; font-size:0.8rem; font-weight:600; z-index:500; opacity:0; transition:opacity 0.3s; white-space:nowrap; pointer-events:none; }
  .toast.show { opacity:1; }

  .cheese-note { text-align:center; font-size:0.73rem; color:var(--purple); font-weight:600; padding:6px; background:#fffde7; border-radius:8px; margin:6px 0; }
</style>
</head>
<body>

<div class="header">

</div>
<div class="banner">🏷️ Tag us on Social Media & Google Review → Get 10% OFF! &nbsp;|&nbsp; Extra Cheese ₹20</div>
<div class="tabs-wrap"><div class="tabs" id="tabs"></div></div>

<button class="cart-btn" id="cartBtn" style="display:none" onclick="openCart()">
  <span>🛒 View Cart</span>
  <span id="cartSummary" style="font-size:0.78rem;opacity:0.85"></span>
  <span class="cart-badge" id="cartCount">0</span>

<div class="toast" id="toast"></div>

<div class="overlay" id="overlay" onclick="closeCart()">
  <div class="drawer" onclick="event.stopPropagation()">
    <div class="drawer-handle"></div>
    <div class="drawer-title">Your Order 🛒</div>
    <div id="cartItems"></div>
    <div id="cartFooter"></div>
  </div>
</div>

<script>
const WA = '917014809238';
const UPI = 'BHARATPE.8P0M0U9N8Z03820@fbpe';
const UNAME = 'Liquido';

// Food images - reliable sources
const I = {
  momos:'https://images.pexels.com/photos/18330950/pexels-photo-18330950.jpg,
  sandwich: 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Grilled_cheese_on_white_with_tomato_soup.jpg/400px-Grilled_cheese_on_white_with_tomato_soup.jpg',
  maggi: 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a3/Masala_Maggi.jpg/400px-Masala_Maggi.jpg',
  wrap: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/67/Burrito_-_Gusta_Me_%285765119734%29.jpg/400px-Burrito_-_Gusta_Me_%285765119734%29.jpg',
  coffee: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/45/A_small_cup_of_coffee.JPG/400px-A_small_cup_of_coffee.JPG',
  shake: 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Oreo_Shake.jpg/400px-Oreo_Shake.jpg',
  burger: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/47/PNG_transparency_demonstration_1.png/400px-PNG_transparency_demonstration_1.png',
  fries: 'https://upload.wikimedia.org/wikipedia/commons/thumb/f/f8/Potato-Chips.jpg/400px-Potato-Chips.jpg',
  drink: 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/2006_09_06_-_Iced_Tea.jpg/400px-2006_09_06_-_Iced_Tea.jpg',
};

const menuData = [
  { cat:'Momos', items:[
    { name:'Veg Steam Momos', img:I.momos, sizes:[{l:'Half (5pc)',p:50},{l:'Full (10pc)',p:80}] },
    { name:'Deep Fried Momos', img:I.momos, sizes:[{l:'Half (5pc)',p:50},{l:'Full (10pc)',p:90}] },
    { name:'Pan Fried Momos', img:I.momos, sizes:[{l:'Half (5pc)',p:50},{l:'Full (10pc)',p:90}] },
    { name:'Fire Tossed Momos', img:I.momos, sizes:[{l:'Half (5pc)',p:70},{l:'Full (10pc)',p:99}] },
    { name:'Kurkure Veg Momos', img:I.momos, sizes:[{l:'Half (5pc)',p:89},{l:'Full (10pc)',p:129}] },
    { name:'Schezwan Momos', img:I.momos, sizes:[{l:'Half (5pc)',p:119},{l:'Full (10pc)',p:149}] },
    { name:'Peri Peri Momos', img:I.momos, sizes:[{l:'Half (5pc)',p:119},{l:'Full (10pc)',p:149}] },
  ]},
  { cat:'Sandwich', items:[
    { name:'Grilled Sandwich', img:I.sandwich, price:79 },
    { name:'Grilled Cheese Sandwich', img:I.sandwich, price:99 },
    { name:'Cheese Corn Sandwich', img:I.sandwich, price:99 },
    { name:'Paneer Sandwich', img:I.sandwich, price:119 },
    { name:'Paneer Cheese Sandwich', img:I.sandwich, price:139 },
    { name:'Cheese Sandwich', img:I.sandwich, price:139 },
  ]},
  { cat:'Maggi', items:[
    { name:'Masala Maggi', img:I.maggi, price:40 },
    { name:'Vegetable Maggi', img:I.maggi, price:50 },
    { name:'Vegetable Cheese Maggi', img:I.maggi, price:80 },
    { name:'Butter Maggi', img:I.maggi, price:60 },
    { name:'Butter Cheese Maggi', img:I.maggi, price:80 },
    { name:'Schezwan Masala Maggi', img:I.maggi, price:70 },
    { name:'Schezwan Cheese Maggi', img:I.maggi, price:80 },
    { name:'Peri Peri Cheese Maggi', img:I.maggi, price:80 },
  ]},
  { cat:'Wrap', items:[
    { name:'Classic Veggie Delight Wrap', img:I.wrap, price:89 },
    { name:'Tandoori Paneer Power Wrap', img:I.wrap, price:129 },
    { name:'Tofu Wrap (Gym Special)', img:I.wrap, price:139 },
  ]},
  { cat:'Cold Coffee', items:[
    { name:'Classic Cold Coffee', img:I.coffee, price:59 },
    { name:'Java Chip Cold Coffee', img:I.coffee, price:79 },
    { name:'Double Chocolate CC', img:I.coffee, price:99 },
    { name:'Oreo Cold Coffee', img:I.coffee, price:99 },
  ]},
  { cat:'Shake', items:[
    { name:'Oreo Shake', img:I.shake, price:79 },
    { name:'Mango Shake', img:I.shake, price:79 },
    { name:'Strawberry Shake', img:I.shake, price:79 },
    { name:'Blueberry Shake', img:I.shake, price:79 },
    { name:'Bubblegum Shake', img:I.shake, price:99 },
    { name:'Kitkat Shake', img:I.shake, price:99 },
    { name:'Kitkat Oreo Shake', img:I.shake, price:99 },
  ]},
  { cat:'Burger', items:[
    { name:'Aloo Tikki Burger', img:I.burger, price:49 },
    { name:'Veg Cheesy Burger', img:I.burger, price:59 },
    { name:'Veg Paneer Burger', img:I.burger, price:89 },
  ]},
  { cat:'Fries', items:[
    { name:'Plain Salted Fries', img:I.fries, price:69 },
    { name:'Peri Peri Masala Fries', img:I.fries, price:99 },
    { name:'Crispy Garlic Butter Fries', img:I.fries, price:129 },
  ]},
  { cat:'Drinks', items:[
    { name:'Water Bottle', img:I.drink, price:20 },
    { name:'Soft Drinks', img:I.drink, price:null },
  ]},
];

let cart = [], locText = '', locCoords = '', payMethod = 'upi';

// TABS
const tabsEl = document.getElementById('tabs');
menuData.forEach((cat, i) => {
  const b = document.createElement('button');
  b.className = 'tab' + (i===0?' active':'');
  b.textContent = cat.cat;
  b.onclick = () => {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('c'+i).scrollIntoView({behavior:'smooth',block:'start'});
  };
  tabsEl.appendChild(b);
});

// MENU
const menuEl = document.getElementById('menuSection');
menuData.forEach((cat, ci) => {
  const sec = document.createElement('div');
  sec.className = 'category';
  sec.id = 'c'+ci;
  sec.innerHTML = `<div class="cat-title">${cat.cat}</div><div class="items-grid" id="g${ci}"></div>`;
  menuEl.appendChild(sec);

  const grid = document.getElementById('g'+ci);
  cat.items.forEach((item) => {
    const card = document.createElement('div');
    card.className = 'item-card';
    const imgTag = item.img ? `<img class="item-img" src="${item.img}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/68x68/f0e6ff/6B21A8?text=🍽️'">` : '';

    if (item.sizes) {
      card.innerHTML = `${imgTag}<div class="item-info"><div class="item-name">${item.name}</div><div class="size-btns">${item.sizes.map(s=>`<button class="size-btn" onclick="addItem('${item.name} - ${s.l}',${s.p})">${s.l} ₹${s.p}</button>`).join('')}</div></div>`;
    } else if (!item.price) {
      card.innerHTML = `${imgTag}<div class="item-info"><div class="item-name">${item.name}</div><div class="item-note">Price at MRP</div></div><button class="add-btn" onclick="addItem('${item.name}',0)">Add</button>`;
    } else {
      card.innerHTML = `${imgTag}<div class="item-info"><div class="item-name">${item.name}</div><div class="item-price">₹${item.price}</div></div><button class="add-btn" onclick="addItem('${item.name}',${item.price})">Add</button>`;
    }
    grid.appendChild(card);
  });
});

function addItem(name, price) {
  const ex = cart.find(i=>i.name===name);
  if (ex) ex.qty++; else cart.push({name,price,qty:1});
  updateCartBtn();
  showToast('✅ ' + name.split(' - ')[0] + ' added!');
}
function removeItem(name) {
  const idx = cart.findIndex(i=>i.name===name);
  if (idx>-1) { cart[idx].qty--; if(cart[idx].qty<=0) cart.splice(idx,1); }
  updateCartBtn(); renderCart();
}

function updateCartBtn() {
  const total = cart.reduce((s,i)=>s+i.price*i.qty,0);
  const count = cart.reduce((s,i)=>s+i.qty,0);
  const btn = document.getElementById('cartBtn');
  if (!count) { btn.style.display='none'; return; }
  btn.style.display='flex';
  document.getElementById('cartCount').textContent = count;
  document.getElementById('cartSummary').textContent = '₹'+total;
}

function openCart() { document.getElementById('overlay').classList.add('show'); renderCart(); }
function closeCart() { document.getElementById('overlay').classList.remove('show'); }

function renderCart() {
  const el = document.getElementById('cartItems');
  const footer = document.getElementById('cartFooter');
  if (!cart.length) {
    el.innerHTML = '<div class="empty">🛒 Cart is empty<br>Add items to order</div>';
    footer.innerHTML=''; return;
  }
  const total = cart.reduce((s,i)=>s+i.price*i.qty,0);
  el.innerHTML = cart.map(item=>`
    <div class="c-item">
      <div class="c-name">${item.name} × ${item.qty}</div>
      <div style="display:flex;align-items:center;gap:6px">
        <div class="c-price">₹${item.price*item.qty}</div>
        <div class="qty-wrap">
          <button class="qty-btn minus" onclick="removeItem('${item.name}')">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="addItem('${item.name}',${item.price})">+</button>
        </div>
      </div>
    </div>`).join('') +
    `<div class="cheese-note">🧀 Extra Cheese sirf ₹20 — instructions mein likho!</div>
    <div class="c-total"><span>Total</span><span>₹${total}</span></div>`;

  footer.innerHTML = `
    <label class="flabel">👤 Aapka Naam *</label>
    <input class="finput" id="cName" placeholder="Naam likhein">
    <label class="flabel">📞 Phone Number *</label>
    <input class="finput" id="cPhone" placeholder="WhatsApp number" type="tel">
    <label class="flabel">📍 Delivery Address *</label>
    <input class="finput" id="cAddr" placeholder="Ghar/dukaan no., gali, area" id="cAddr">
    <button class="loc-btn" id="locBtn" onclick="getLocation()">📍 GPS se Location Detect Karo</button>
    <div id="locRes"></div>
    <label class="flabel">📝 Special Instructions (optional)</label>
    <input class="finput" id="cNote" placeholder="Kam teekha, extra cheese, etc.">
    <div style="font-weight:700;font-size:0.88rem;margin-top:14px;margin-bottom:6px;">💳 Payment Method</div>
    <div class="pay-opts">
      <div class="pay-opt sel" id="pUPI" onclick="selPay('upi')"><span class="icon">📲</span>UPI / QR</div>
      <div class="pay-opt" id="pCOD" onclick="selPay('cod')"><span class="icon">💵</span>Cash on Delivery</div>
    </div>
    <div id="payBox"></div>
    <button class="order-btn" onclick="placeOrder()">💬 WhatsApp pe Order Bhejo</button>`;
  renderPay(total);
}

function selPay(m) {
  payMethod = m;
  document.getElementById('pUPI').classList.toggle('sel', m==='upi');
  document.getElementById('pCOD').classList.toggle('sel', m==='cod');
  const total = cart.reduce((s,i)=>s+i.price*i.qty,0);
  renderPay(total);
}

function renderPay(total) {
  const el = document.getElementById('payBox');
  if (!el) return;
  if (payMethod==='upi') {
    const link = `upi://pay?pa=${encodeURIComponent(UPI)}&pn=${encodeURIComponent(UNAME)}&am=${total}&cu=INR&tn=Liquido+Order`;
    el.innerHTML = `<div class="upi-box">
      <div class="upi-id">UPI ID: <b>${UPI}</b></div>
      <div class="upi-id" style="margin-top:3px">Name: <b>${UNAME}</b></div>
      <div class="upi-amt">₹${total}</div>
      <div style="font-size:0.7rem;color:#888;">PhonePe • GPay • Paytm • BharatPe se pay karein</div>
      <a class="upi-link" href="${link}">🔗 UPI App Kholo aur Pay Karo</a>
    </div>`;
  } else {
    el.innerHTML = `<div class="cod-box">💵 Delivery ke time cash payment karein. Hamare delivery partner amount collect karenge.</div>`;
  }
}

function getLocation() {
  const btn = document.getElementById('locBtn');
  const res = document.getElementById('locRes');
  if (!navigator.geolocation) {
    res.innerHTML = '<div class="loc-ok" style="background:#ffe8e8;color:red;">❌ Aapka browser location support nahi karta</div>'; return;
  }
  btn.textContent = '⏳ Detect ho raha hai...';
  btn.disabled = true;
  navigator.geolocation.getCurrentPosition(
    pos => {
      const lat = pos.coords.latitude.toFixed(5);
      const lng = pos.coords.longitude.toFixed(5);
      locCoords = `${lat},${lng}`;
      locText = `https://maps.google.com/?q=${lat},${lng}`;
      res.innerHTML = `<div class="loc-ok">✅ Location detect ho gayi! (${lat}, ${lng})<br><a href="${locText}" target="_blank" style="color:green;font-size:0.72rem;">Map pe dekho</a></div>`;
      btn.textContent = '✅ Location Detect Ho Gayi';
    },
    err => {
      let msg = '❌ Location nahi mili. ';
      if (err.code===1) msg += 'Permission denied — browser settings mein allow karein.';
      else if (err.code===2) msg += 'GPS signal nahi mila.';
      else msg += 'Dobara try karein.';
      res.innerHTML = `<div class="loc-ok" style="background:#ffe8e8;color:red;">${msg}</div>`;
      btn.textContent = '📍 GPS se Location Detect Karo';
      btn.disabled = false;
    },
    { enableHighAccuracy:true, timeout:10000, maximumAge:0 }
  );
}

function placeOrder() {
  const name = document.getElementById('cName')?.value.trim();
  const phone = document.getElementById('cPhone')?.value.trim();
  const addr = document.getElementById('cAddr')?.value.trim();
  const note = document.getElementById('cNote')?.value.trim();
  if (!name) { showToast('❗ Naam likhein'); return; }
  if (!phone) { showToast('❗ Phone number likhein'); return; }
  if (!addr && !locText) { showToast('❗ Address ya location dein'); return; }
  const total = cart.reduce((s,i)=>s+i.price*i.qty,0);
  const items = cart.map(i=>`• ${i.name} × ${i.qty} = ₹${i.price*i.qty}`).join('\n');
  let msg = `🍽️ *LIQUIDO — Naya Order*\n\n`;
  msg += `👤 *Naam:* ${name}\n📞 *Phone:* ${phone}\n\n`;
  msg += `📦 *Order:*\n${items}\n\n`;
  msg += `💰 *Total: ₹${total}*\n`;
  msg += `💳 *Payment:* ${payMethod==='upi'?'UPI / Online':'Cash on Delivery'}\n\n`;
  if (addr) msg += `📍 *Address:* ${addr}\n`;
  if (locText) msg += `🗺️ *Live Location:* ${locText}\n`;
  if (note) msg += `📝 *Instructions:* ${note}`;
  window.open(`https://wa.me/${WA}?text=${encodeURIComponent(msg)}`, '_blank');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}
</script>
